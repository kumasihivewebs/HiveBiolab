services:
  db:
    image: postgres:16
    container_name: biolab-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-biolab}
      POSTGRES_USER: ${DB_USER:-africaosh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-biolab_dev_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  api:
    build: .
    container_name: hivebiolab-api
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn hivebiolab.wsgi:application
             -b 0.0.0.0:8002
             --workers 3
             --timeout 120"

    env_file:
      - .env
    environment:
      DB_NAME: ${DB_NAME:-biolab}
      DB_USER: ${DB_USER:-africaosh}
      DB_PASSWORD: ${DB_PASSWORD:-biolab_dev_password_change_me}
      DB_HOST: db
      DB_PORT: 5432
      GUNICORN_CMD_ARGS: "--bind=0.0.0.0:8002 --workers=3 --timeout=120"

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"

    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles

    networks:
      - appnet

networks:
  appnet:

volumes:
  postgres_data:
